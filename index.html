<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vmonix</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div class="app">

    <h1>Vmonix</h1>
    <p class="subtitle">AI Creator Toolkit</p>

    <div class="grid">

<button onclick="openTool('YouTube Titles')">YouTube Titles</button>
<button onclick="openTool('Hooks')">Hooks</button>
<button onclick="openTool('Scripts')">Scripts</button>
<button onclick="openTool('Captions')">Captions</button>
<button onclick="openTool('Hashtags')">Hashtags</button>
<button onclick="openTool('Ideas')">Ideas</button>

    </div>

    <div class="tool-box">
      <h2 id="toolName">Select a tool</h2>

      <input id="input" placeholder="Enter topic..." />

      <button onclick="generate()">Generate</button>

      <div class="output" id="output"></div>

<button onclick="copyText()">Copy Result</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
